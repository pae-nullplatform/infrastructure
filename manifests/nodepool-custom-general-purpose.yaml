apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: custom-general-purpose
spec:
  weight: 100
  template:
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: custom
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        - key: eks.amazonaws.com/instance-category
          operator: In
          values:
            - c
            - m
            - r
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
  limits:
    cpu: "1000"
    memory: 1000Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
